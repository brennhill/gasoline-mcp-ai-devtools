  <!-- Tagline -->
  <text x="400" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#f97316" text-anchor="middle">QA-first AI browser devtools</text>
  <!-- Description -->
  <text x="400" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="300" fill="#94a3b8" text-anchor="middle">Browser DevTools for AI coding assistants via MCP</text>
  <!-- Flow pills -->
  <g transform="translate(170, 410)">
