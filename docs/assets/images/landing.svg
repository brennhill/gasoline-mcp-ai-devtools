    <text x="50" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Browser</text>
    <path d="M114 17 L126 17 M121 12 L127 17 L121 22" stroke="#475569" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="144" y="0" width="110" height="34" rx="17" fill="none" stroke="#334155" stroke-width="1"/>
    <text x="199" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Extension</text>
    <path d="M268 17 L280 17 M275 12 L281 17 L275 22" stroke="#475569" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="298" y="0" width="120" height="34" rx="17" fill="none" stroke="#334155" stroke-width="1"/>
    <text x="358" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Local Server</text>
    <path d="M432 17 L444 17 M439 12 L445 17 L439 22" stroke="#475569" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="462" y="0" width="80" height="34" rx="17" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-width="1"/>
    <text x="502" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#fb923c" text-anchor="middle">AI</text>
