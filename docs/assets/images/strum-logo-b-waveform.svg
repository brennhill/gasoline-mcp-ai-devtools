    </filter>
  </defs>
  <polygon points="64,5 117,34.5 117,93.5 64,123 11,93.5 11,34.5" fill="#1a1a1a"/>
  <polygon points="64,5 117,34.5 117,93.5 64,123 11,93.5 11,34.5" fill="none" stroke="#f97316" stroke-width="1" opacity="0.3" filter="url(#hgB)"/>
  <!-- Audio waveform bars — like a visualizer -->
  <g clip-path="url(#hexB)" filter="url(#glB)">
    <rect x="22" y="58" width="4" height="12" rx="1" fill="#f97316"/>
