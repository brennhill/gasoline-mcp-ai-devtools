<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="b1" x1="0" y1="0" x2="128" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fde047"/>
    </linearGradient>
    <clipPath id="hexB">
      <polygon points="64,5 117,34.5 117,93.5 64,123 11,93.5 11,34.5"/>
    </clipPath>
    <filter id="glB" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hgB" x="-20%" y="-20%" width="140%" height="140%">
