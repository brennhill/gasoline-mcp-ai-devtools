      <animateTransform attributeName="transform" type="translate" values="0,0;4,12;0,0;-4,-12;0,0" dur="0.8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.25;0.5;0.75;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
