<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="d1" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#f97316"/><stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="d2" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
