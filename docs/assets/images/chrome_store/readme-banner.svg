<svg width="1280" height="280" viewBox="0 0 1280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="280" rx="12" fill="#141b24"/>

  <defs>
    <radialGradient id="glow" cx="15%" cy="50%" r="25%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#141b24;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="innerFlame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fef3c7"/>
    </linearGradient>
  </defs>

  <!-- Glow -->
  <rect width="1280" height="280" rx="12" fill="url(#glow)"/>

  <!-- STRUM logo -->
  <g transform="translate(100, 50) scale(1.4)">
    <g transform="translate(1.5, 1.5) scale(0.25)">
      <circle cx="250" cy="250" r="240" fill="#302d2a" />
      <clipPath id="cp-readme">
        <circle cx="250" cy="250" r="240" />
      </clipPath>
      <g clip-path="url(#cp-readme)">
        <g transform="translate(250, 250) rotate(-32) translate(-250, -250)">
          <path d="M150 -100 L178 -100 Q 185 250 202 600 L150 600 Q 140 250 150 -100 Z" fill="#b45309" />
          <path d="M212 -100 L240 -100 Q 252 250 272 600 L220 600 Q 205 250 212 -100 Z" fill="#d97706" />
          <path d="M274 -100 L302 -100 Q 318 250 342 600 L290 600 Q 272 250 274 -100 Z" fill="#f59e0b" />
          <path d="M336 -100 L364 -100 Q 385 250 412 600 L360 600 Q 338 250 336 -100 Z" fill="#fbbf24" />
          <path d="M398 -100 L426 -100 Q 452 250 482 600 L430 600 Q 405 250 398 -100 Z" fill="#fcd34d" />
        </g>
      </g>
      <circle cx="250" cy="250" r="240" fill="none" stroke="#222" stroke-width="12" />
    </g>
  </g>

  <!-- Title -->
  <text x="360" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="600" fill="#ffffff">STRUM</text>

  <!-- Tagline -->
  <text x="360" y="165" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#8b949e">Agentic Browser Devtools - rapid e2e web development</text>

  <!-- Flow pills -->
  <g transform="translate(360, 200)">
    <rect x="0" y="0" width="100" height="34" rx="17" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="50" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">Browser</text>

    <path d="M114 17 L126 17 M121 12 L127 17 L121 22" stroke="#484f58" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="144" y="0" width="110" height="34" rx="17" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="199" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">Extension</text>

    <path d="M268 17 L280 17 M275 12 L281 17 L275 22" stroke="#484f58" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="298" y="0" width="120" height="34" rx="17" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="358" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">Local Server</text>

    <path d="M432 17 L444 17 M439 12 L445 17 L439 22" stroke="#484f58" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="462" y="0" width="100" height="34" rx="17" fill="#2d1a0e" stroke="#f97316" stroke-width="1"/>
    <text x="512" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#fb923c" text-anchor="middle">AI</text>
  </g>
</svg>
