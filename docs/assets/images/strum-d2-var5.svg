    <line x1="16" y1="-16" x2="62" y2="122" stroke="url(#d1)" stroke-width="12" stroke-linecap="butt">
      <animateTransform attributeName="transform" type="translate" values="0,0;3,9;0,0;-3,-9;0,0" dur="1.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.25;0.5;0.75;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </line>
    <line x1="46" y1="4" x2="86" y2="124" stroke="url(#d2)" stroke-width="8" stroke-linecap="butt">
      <animateTransform attributeName="transform" type="translate" values="0,0;3,9;0,0;-3,-9;0,0" dur="1.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.25;0.5;0.75;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </line>
    <line x1="70" y1="10" x2="118" y2="154" stroke="url(#d3)" stroke-width="4" stroke-linecap="butt">
      <animateTransform attributeName="transform" type="translate" values="0,0;3,9;0,0;-3,-9;0,0" dur="1.2s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.25;0.5;0.75;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
