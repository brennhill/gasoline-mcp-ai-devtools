<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="d1" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#f97316"/><stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="d2" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#fb923c"/><stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="d3" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#fbbf24"/><stop offset="100%" style="stop-color:#fde047"/>
    </linearGradient>
    <clipPath id="c"><circle cx="64" cy="64" r="59"/></clipPath>
    <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="64" cy="64" r="60" fill="#1a1a1a"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Var 3: Staggered speeds — each line different tempo -->
  <g clip-path="url(#c)" filter="url(#gl)">
    <line x1="20" y1="-6" x2="58" y2="108" stroke="url(#d1)" stroke-width="12" stroke-linecap="butt">
      <animateTransform attributeName="transform" type="translate" values="0,0;2,6;0,0;-2,-6;0,0" dur="0.4s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.25;0.5;0.75;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </line>
    <line x1="50" y1="16" x2="82" y2="112" stroke="url(#d2)" stroke-width="9" stroke-linecap="butt">
      <animateTransform attributeName="transform" type="translate" values="0,0;2,6;0,0;-2,-6;0,0" dur="0.55s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.25;0.5;0.75;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </line>
    <line x1="72" y1="20" x2="110" y2="134" stroke="url(#d3)" stroke-width="6" stroke-linecap="butt">
      <animateTransform attributeName="transform" type="translate" values="0,0;2,6;0,0;-2,-6;0,0" dur="0.7s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.25;0.5;0.75;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    </line>
  </g>
</svg>
