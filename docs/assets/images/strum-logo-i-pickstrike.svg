<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="i1" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <clipPath id="hexI">
      <polygon points="64,5 117,34.5 117,93.5 64,123 11,93.5 11,34.5"/>
    </clipPath>
    <filter id="glI" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hgI" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <polygon points="64,5 117,34.5 117,93.5 64,123 11,93.5 11,34.5" fill="#1a1a1a"/>
  <polygon points="64,5 117,34.5 117,93.5 64,123 11,93.5 11,34.5" fill="none" stroke="#f97316" stroke-width="1" opacity="0.3" filter="url(#hgI)"/>
  <g clip-path="url(#hexI)" filter="url(#glI)">
    <!-- Guitar pick / triangle shape -->
    <polygon points="64,28 40,90 88,90" fill="none" stroke="#f97316" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Three horizontal strings crossing through the pick -->
    <line x1="0" y1="55" x2="128" y2="55" stroke="#f97316" stroke-width="4" stroke-linecap="butt"/>
    <line x1="0" y1="68" x2="128" y2="68" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="butt"/>
    <line x1="0" y1="78" x2="128" y2="78" stroke="#fde047" stroke-width="1.5" stroke-linecap="butt"/>
  </g>
</svg>
