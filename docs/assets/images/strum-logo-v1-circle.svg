<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="s1" x1="0" y1="5" x2="0" y2="123" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="s2" x1="0" y1="5" x2="0" y2="123" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="s3" x1="0" y1="5" x2="0" y2="123" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fde047"/>
