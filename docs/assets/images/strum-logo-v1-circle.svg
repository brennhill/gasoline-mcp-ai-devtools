    <line x1="66" y1="-10" x2="66" y2="138" stroke="url(#s2)" stroke-width="3.5" stroke-linecap="butt"/>
    <line x1="76" y1="-10" x2="76" y2="138" stroke="url(#s3)" stroke-width="2" stroke-linecap="butt"/>
