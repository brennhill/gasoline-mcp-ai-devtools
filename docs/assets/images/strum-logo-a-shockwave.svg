<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="a1" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fde047"/>
    </linearGradient>
    <clipPath id="circA"><circle cx="64" cy="64" r="59"/></clipPath>
    <filter id="glA" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="64" cy="64" r="60" fill="#1a1a1a"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <g clip-path="url(#circA)" filter="url(#glA)">
    <!-- Concentric shockwave rings radiating from center-left -->
    <circle cx="38" cy="64" r="15" fill="none" stroke="#f97316" stroke-width="4" opacity="0.9"/>
    <circle cx="38" cy="64" r="30" fill="none" stroke="#fb923c" stroke-width="3" opacity="0.7"/>
    <circle cx="38" cy="64" r="48" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.5"/>
    <circle cx="38" cy="64" r="68" fill="none" stroke="#fde047" stroke-width="2" opacity="0.35"/>
    <circle cx="38" cy="64" r="90" fill="none" stroke="#fef3c7" stroke-width="1.5" opacity="0.2"/>
  </g>
</svg>
