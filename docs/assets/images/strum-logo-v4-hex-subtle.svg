<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="s1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="s2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="s3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fde047"/>
    </linearGradient>
    <clipPath id="hexClip">
      <polygon points="64,5 117,34.5 117,93.5 64,123 11,93.5 11,34.5"/>
    </clipPath>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hexglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <polygon points="64,5 117,34.5 117,93.5 64,123 11,93.5 11,34.5" fill="#1a1a1a"/>
  <polygon points="64,5 117,34.5 117,93.5 64,123 11,93.5 11,34.5" fill="none" stroke="#f97316" stroke-width="1" opacity="0.3" filter="url(#hexglow)"/>
  <g clip-path="url(#hexClip)" filter="url(#glow)">
    <line x1="2" y1="-10" x2="106" y2="138" stroke="url(#s1)" stroke-width="5" stroke-linecap="butt"/>
    <line x1="15" y1="-10" x2="119" y2="138" stroke="url(#s2)" stroke-width="3.5" stroke-linecap="butt"/>
    <line x1="26" y1="-10" x2="130" y2="138" stroke="url(#s3)" stroke-width="2" stroke-linecap="butt"/>
  </g>
</svg>
