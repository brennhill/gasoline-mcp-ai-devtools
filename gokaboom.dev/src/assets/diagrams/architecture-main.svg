<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #F97316; stroke: #ea580c; stroke-width: 2; }
      .box-dark { fill: #0F172A; stroke: #F97316; stroke-width: 2; }
      .box-light { fill: #1E293B; stroke: #F97316; stroke-width: 1; }
      .text-dark { fill: #0F172A; font-family: system-ui; font-size: 14px; font-weight: bold; }
      .text-light { fill: #FFFFFF; font-family: system-ui; font-size: 14px; font-weight: bold; }
      .text-sm { font-size: 12px; }
      .arrow { stroke: #F97316; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { fill: #FFFFFF; font-family: system-ui; font-size: 11px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F97316" />
    </marker>
  </defs>

  <!-- Browser Section -->
  <rect class="box" x="20" y="20" width="280" height="200" rx="8"/>
  <text class="text-dark" x="40" y="45">🌐 Browser</text>

  <rect class="box-light" x="35" y="60" width="250" height="40" rx="4"/>
  <text class="text-light" x="50" y="78">inject.js (page context)</text>

  <rect class="box-light" x="35" y="110" width="250" height="40" rx="4"/>
  <text class="text-light" x="50" y="128">content.js (isolated world)</text>

  <rect class="box-light" x="35" y="160" width="250" height="40" rx="4"/>
  <text class="text-light" x="50" y="178">background.js (service worker)</text>

  <!-- Arrows between browser components -->
  <path class="arrow" d="M 160 100 L 160 110"/>
  <path class="arrow" d="M 160 150 L 160 160"/>

  <!-- Server Section -->
  <rect class="box-dark" x="370" y="20" width="280" height="200" rx="8"/>
  <text class="text-light" x="390" y="45">⚙️ Kaboom Server (Go)</text>

  <rect class="box-light" x="385" y="60" width="250" height="40" rx="4"/>
  <text class="text-light" x="400" y="78">HTTP Endpoints</text>

  <rect class="box-light" x="385" y="110" width="250" height="40" rx="4"/>
  <text class="text-light" x="400" y="128">MCP Protocol</text>

  <rect class="box-light" x="385" y="160" width="250" height="40" rx="4"/>
  <text class="text-light" x="400" y="178">Ring Buffers & Storage</text>

  <!-- Arrows between server components -->
  <path class="arrow" d="M 510 100 L 510 110"/>
  <path class="arrow" d="M 510 150 L 510 160"/>

  <!-- AI Section -->
  <rect class="box-dark" x="720" y="20" width="260" height="200" rx="8"/>
  <text class="text-light" x="740" y="45">🤖 Your AI Tool</text>

  <rect class="box-light" x="735" y="70" width="230" height="130" rx="4"/>
  <text class="text-light" x="750" y="95">Claude Code</text>
  <text class="text-light" x="750" y="115">Cursor</text>
  <text class="text-light" x="750" y="135">Windsurf</text>
  <text class="text-light" x="750" y="155">Zed</text>
  <text class="text-light" x="750" y="175">Claude Desktop</text>

  <!-- Connections -->
  <!-- Browser to Server -->
  <path class="arrow" d="M 300 120 L 370 120"/>
  <text class="label" x="320" y="115">HTTP POST</text>
  <text class="label" x="320" y="130">localhost:7890</text>

  <!-- Server to AI -->
  <path class="arrow" d="M 650 120 L 720 120"/>
  <text class="label" x="665" y="115">MCP JSON-RPC 2.0</text>
  <text class="label" x="665" y="130">stdio</text>

  <!-- Legend -->
  <rect x="20" y="260" width="960" height="300" fill="#0F172A" stroke="#F97316" stroke-width="1" rx="4"/>

  <text class="text-light" x="40" y="290" style="font-size: 16px;">Data Flow</text>

  <text class="text-light" x="40" y="330">1. Browser captures telemetry (click, network, console, errors)</text>
  <text class="text-light" x="40" y="355">2. Extension batches events and POSTs to Go server</text>
  <text class="text-light" x="40" y="380">3. Server stores in ring buffers and JSONL files</text>
  <text class="text-light" x="40" y="405">4. MCP tools expose data to AI via stdin/stdout</text>
  <text class="text-light" x="40" y="430">5. AI queries observe(), generate(), configure(), interact()</text>
  <text class="text-light" x="40" y="455">6. All data stays local (127.0.0.1 - no external transmission)</text>
</svg>