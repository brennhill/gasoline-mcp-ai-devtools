<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .participant-box { fill: #1E293B; stroke: #F97316; stroke-width: 2; }
      .participant-text { fill: #FFFFFF; font-family: system-ui; font-size: 14px; font-weight: bold; }
      .message-arrow { stroke: #F97316; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .message-arrow-dashed { stroke: #F97316; stroke-width: 2; fill: none; stroke-dasharray: 4,4; marker-end: url(#arrowhead); }
      .message-label { fill: #FFFFFF; font-family: system-ui; font-size: 12px; }
      .lifeline { stroke: #334155; stroke-width: 1; stroke-dasharray: 3,3; }
      .note-box { fill: #0F172A; stroke: #F97316; stroke-width: 1; }
      .note-text { fill: #FFFFFF; font-family: system-ui; font-size: 11px; }
      .event-number { fill: #FBBF24; font-family: system-ui; font-size: 11px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F97316" />
    </marker>
  </defs>

  <!-- Title -->
  <text style="font-size: 18px; font-weight: bold; fill: #FFFFFF;" x="20" y="35">Reverse Communication Flow: AI Command → Browser Action</text>

  <!-- Participant boxes -->
  <rect class="participant-box" x="50" y="60" width="100" height="35" rx="4"/>
  <text class="participant-text" x="65" y="83">AI Tool</text>

  <rect class="participant-box" x="220" y="60" width="120" height="35" rx="4"/>
  <text class="participant-text" x="235" y="83">Go Server</text>

  <rect class="participant-box" x="430" y="60" width="140" height="35" rx="4"/>
  <text class="participant-text" x="440" y="83">background.js</text>

  <rect class="participant-box" x="660" y="60" width="100" height="35" rx="4"/>
  <text class="participant-text" x="675" y="83">Browser</text>

  <!-- Lifelines -->
  <line class="lifeline" x1="100" y1="95" x2="100" y2="420"/>
  <line class="lifeline" x1="280" y1="95" x2="280" y2="420"/>
  <line class="lifeline" x1="500" y1="95" x2="500" y2="420"/>
  <line class="lifeline" x1="710" y1="95" x2="710" y2="420"/>

  <!-- Message 1: AI → Server -->
  <path class="message-arrow" d="M 150 140 L 220 140"/>
  <text class="event-number" x="155" y="135">1</text>
  <text class="message-label" x="135" y="133">interact() call</text>

  <!-- Server note -->
  <rect class="note-box" x="210" y="155" width="160" height="35" rx="3"/>
  <text class="note-text" x="225" y="170">Create pending query</text>
  <text class="note-text" x="225" y="184">(action queued)</text>

  <!-- Message 2: background.js → Server (poll) -->
  <path class="message-arrow-dashed" d="M 430 240 L 280 240"/>
  <text class="event-number" x="335" y="235">2</text>
  <text class="message-label" x="310" y="233">Poll /pending-queries</text>

  <!-- Message 3: Server → background.js (response) -->
  <path class="message-arrow-dashed" d="M 280 280 L 430 280"/>
  <text class="event-number" x="335" y="275">3</text>
  <text class="message-label" x="310" y="273">Return pending action</text>

  <!-- Message 4: background.js → Browser -->
  <path class="message-arrow" d="M 570 320 L 660 320"/>
  <text class="event-number" x="575" y="315">4</text>
  <text class="message-label" x="545" y="313">Execute action:</text>
  <text class="message-label" x="545" y="327">(click, type, navigate)</text>

  <!-- Message 5: background.js → Server (result) -->
  <path class="message-arrow" d="M 500 360 L 280 360"/>
  <text class="event-number" x="385" y="355">5</text>
  <text class="message-label" x="345" y="353">POST result to /sync</text>

  <!-- Message 6: Server → AI (return) -->
  <path class="message-arrow-dashed" d="M 280 395 L 100 395"/>
  <text class="event-number" x="180" y="390">6</text>
  <text class="message-label" x="135" y="388">Return result</text>

  <!-- Legend -->
  <rect x="20" y="450" width="960" height="30" fill="none" stroke="#334155" stroke-width="1" rx="3"/>
  <text style="fill: #FFFFFF; font-size: 12px; font-family: system-ui;" x="35" y="470">Solid arrows = MCP calls | Dashed arrows = Polling/responses | Full cycle: &lt;100ms (cold start) to &lt;5ms (warm)</text>
</svg>
