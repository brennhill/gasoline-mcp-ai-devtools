<svg viewBox="0 0 1000 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .section-header { fill: #F97316; stroke: #ea580c; stroke-width: 2; }
      .section-title { fill: #0F172A; font-family: system-ui; font-size: 13px; font-weight: bold; }
      .section-dark { fill: #0F172A; stroke: #F97316; stroke-width: 2; }
      .section-light { fill: #1E293B; stroke: #F97316; stroke-width: 1; }
      .text-dark { fill: #0F172A; font-family: system-ui; font-size: 12px; font-weight: bold; }
      .text-light { fill: #FFFFFF; font-family: system-ui; font-size: 11px; }
      .text-sm { font-size: 10px; }
      .arrow { stroke: #F97316; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { fill: #FFFFFF; font-family: system-ui; font-size: 10px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F97316" />
    </marker>
  </defs>

  <!-- Title -->
  <text style="font-size: 18px; font-weight: bold; fill: #FFFFFF;" x="20" y="35">STRUM Replay: Session Capture Architecture</text>

  <!-- Browser Section -->
  <rect class="section-header" x="20" y="60" width="240" height="300" rx="6"/>
  <text class="section-title" x="35" y="80">🌐 Production Browser</text>

  <rect class="section-light" x="35" y="100" width="210" height="230" rx="4"/>
  <text class="text-light" x="50" y="120">replay.js (<5KB gzipped)</text>
  <text class="text-light text-sm" x="50" y="135">▪ MutationObserver</text>
  <text class="text-light text-sm" x="50" y="148">▪ Event listeners</text>
  <text class="text-light text-sm" x="50" y="161">▪ PerformanceObserver</text>
  <text class="text-light text-sm" x="50" y="174">▪ Console intercept</text>
  <text class="text-light text-sm" x="50" y="187">▪ Network intercept</text>
  <text class="text-light text-sm" x="50" y="200">▪ PII scanner</text>
  <text class="text-light text-sm" x="50" y="213">▪ Smart selector</text>
  <text class="text-light text-sm" x="50" y="226">▪ Batched every 5s</text>
  <text class="text-light text-sm" x="50" y="239">▪ sendBeacon</text>

  <!-- Server Section -->
  <rect class="section-dark" x="310" y="60" width="650" height="300" rx="6"/>
  <text class="text-light" x="330" y="80" style="font-size: 13px; font-weight: bold;">⚙️  STRUM Replay Server (Go)</text>

  <!-- Session Assembler -->
  <rect class="section-light" x="330" y="100" width="140" height="90" rx="4"/>
  <text class="text-light" x="345" y="120" style="font-weight: bold;">Session</text>
  <text class="text-light" x="345" y="133">Assembler</text>
  <text class="text-light text-sm" x="345" y="148">▪ Receives</text>
  <text class="text-light text-sm" x="345" y="160">▪ Groups</text>
  <text class="text-light text-sm" x="345" y="172">▪ Validates</text>
  <text class="text-light text-sm" x="345" y="184">▪ Writes</text>

  <!-- Session Index -->
  <rect class="section-light" x="500" y="100" width="140" height="90" rx="4"/>
  <text class="text-light" x="515" y="120" style="font-weight: bold;">Session</text>
  <text class="text-light" x="515" y="133">Index</text>
  <text class="text-light text-sm" x="515" y="148">▪ In-memory</text>
  <text class="text-light text-sm" x="515" y="160">▪ Metadata</text>
  <text class="text-light text-sm" x="515" y="172">▪ Searchable</text>

  <!-- Reconstruction -->
  <rect class="section-light" x="670" y="100" width="140" height="90" rx="4"/>
  <text class="text-light" x="685" y="120" style="font-weight: bold;">Reconstruction</text>
  <text class="text-light text-sm" x="685" y="138">▪ DOM snapshots</text>
  <text class="text-light text-sm" x="685" y="150">▪ Deterministic</text>
  <text class="text-light text-sm" x="685" y="162">▪ Server-side</text>
  <text class="text-light text-sm" x="685" y="174">▪ DOM rebuild</text>

  <!-- Storage -->
  <rect class="section-light" x="330" y="220" width="480" height="90" rx="4"/>
  <text class="text-light" x="345" y="240" style="font-weight: bold;">Storage & MCP Interface</text>
  <text class="text-light text-sm" x="345" y="255">▪ Ring buffer: 1K sessions</text>
  <text class="text-light text-sm" x="345" y="268">▪ JSONL: ~/.gasoline/replay</text>
  <text class="text-light text-sm" x="345" y="281">▪ TTL: 7 days</text>
  <text class="text-light text-sm" x="540" y="255">▪ MCP Interface (observe_sessions, replay_session, analyze_session, diff_sessions)</text>

  <!-- Data flow arrows -->
  <!-- Browser to Assembler -->
  <path class="arrow" d="M 260 210 L 330 145"/>
  <text class="label" x="270" y="165">HTTP POST</text>
  <text class="label" x="270" y="178">:7890</text>

  <!-- Assembler to Index -->
  <path class="arrow" d="M 470 145 L 500 145"/>
  <text class="label" x="475" y="140">metadata</text>

  <!-- Assembler to Reconstruction -->
  <path class="arrow" d="M 470 160 L 670 130"/>
  <text class="label" x="550" y="140">events</text>

  <!-- Assembler to Storage -->
  <path class="arrow" d="M 400 190 L 400 220"/>

  <!-- Summary box -->
  <rect x="20" y="380" width="940" height="150" fill="none" stroke="#334155" stroke-width="1" rx="4"/>
  <text style="fill: #F97316; font-weight: bold; font-size: 13px;" x="40" y="400">Key Features:</text>

  <text style="fill: #FFFFFF; font-size: 11px; font-family: system-ui;" x="40" y="420">✓ Event-based capture (not video) — 10-to-100 times smaller data per session (10-50KB/min vs 1-5MB/min for video)</text>
  <text style="fill: #FFFFFF; font-size: 11px; font-family: system-ui;" x="40" y="435">✓ Structured for AI — DOM mutations, user actions, network, console all queryable</text>
  <text style="fill: #FFFFFF; font-size: 11px; font-family: system-ui;" x="40" y="450">✓ PII redaction by default — sensitive fields (passwords, tokens, emails) stripped before storage</text>
  <text style="fill: #FFFFFF; font-size: 11px; font-family: system-ui;" x="40" y="465">✓ Session correlation — link to production errors, server logs, user profiles</text>
  <text style="fill: #FFFFFF; font-size: 11px; font-family: system-ui;" x="40" y="480">✓ Deterministic replay — server-side DOM reconstruction allows scrubbing to any timestamp</text>
  <text style="fill: #FFFFFF; font-size: 11px; font-family: system-ui;" x="40" y="495">✓ AI-native output — structured event sequence, not canvas frames. AI processes in milliseconds.</text>
  <text style="fill: #FFFFFF; font-size: 11px; font-family: system-ui;" x="40" y="510">✓ Local storage — localhost:7890, no cloud transmission, JSONL disk format for audit trail</text>
</svg>
