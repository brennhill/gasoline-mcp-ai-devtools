<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <style>
    @keyframes harmonic {
      0%, 100% { transform: translateX(0); filter: brightness(1); }
      50% { transform: translateX(20px); filter: brightness(1.4); }
    }
    .strum { animation: harmonic 2s infinite ease-in-out; }
    .s1 { fill: #b45309; animation-delay: 0s; }
    .s2 { fill: #d97706; animation-delay: -0.1s; }
    .s3 { fill: #f59e0b; animation-delay: -0.2s; }
    .s4 { fill: #fbbf24; animation-delay: -0.3s; }
    .s5 { fill: #fcd34d; animation-delay: -0.4s; }
  </style>
  <circle cx="250" cy="250" r="240" fill="black" stroke="#222" stroke-width="12" />
  <clipPath id="cp">
    <circle cx="250" cy="250" r="240" />
  </clipPath>
  <g clip-path="url(#cp)">
    <g transform="translate(250, 250) rotate(-32) translate(-250, -250)">
      <path class="strum s1" d="M150 -100 L178 -100 Q 185 250 202 600 L150 600 Q 140 250 150 -100 Z" />
      <path class="strum s2" d="M212 -100 L240 -100 Q 252 250 272 600 L220 600 Q 205 250 212 -100 Z" />
      <path class="strum s3" d="M274 -100 L302 -100 Q 318 250 342 600 L290 600 Q 272 250 274 -100 Z" />
      <path class="strum s4" d="M336 -100 L364 -100 Q 385 250 412 600 L360 600 Q 338 250 336 -100 Z" />
      <path class="strum s5" d="M398 -100 L426 -100 Q 452 250 482 600 L430 600 Q 405 250 398 -100 Z" />
    </g>
  </g>
</svg>
