<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRUM Logo - Vibration Base</title>
    <style>
        body {
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        svg {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Reverted taper (28px -> 52px) with Strong Curve -->
        <svg viewBox="0 0 500 500" width="400" height="400">
            <circle cx="250" cy="250" r="240" fill="#302d2a" />
            
            <clipPath id="circle-clip">
                <circle cx="250" cy="250" r="240" />
            </clipPath>
            
            <g clip-path="url(#circle-clip)">
                <g transform="translate(250, 250) rotate(-32) translate(-250, -250)">
                    
                    <!-- Stripe 1 -->
                    <path d="M150 -100 L178 -100 Q 185 250 202 600 L150 600 Q 140 250 150 -100 Z" fill="white" />
                    
                    <!-- Stripe 2 -->
                    <path d="M212 -100 L240 -100 Q 252 250 272 600 L220 600 Q 205 250 212 -100 Z" fill="white" />
                    
                    <!-- Stripe 3 -->
                    <path d="M274 -100 L302 -100 Q 318 250 342 600 L290 600 Q 272 250 274 -100 Z" fill="white" />
                    
                    <!-- Stripe 4 -->
                    <path d="M336 -100 L364 -100 Q 385 250 412 600 L360 600 Q 338 250 336 -100 Z" fill="white" />
                    
                    <!-- Stripe 5 -->
                    <path d="M398 -100 L426 -100 Q 452 250 482 600 L430 600 Q 405 250 398 -100 Z" fill="white" />
                    
                </g>
            </g>
        </svg>
        
        <h2>STRUM Base</h2>
        <p style="color: #666; max-width: 400px; margin: 0 auto;">
            Taper reverted (slight), Curve maintained (strong).
        </p>
    </div>
</body>
</html>
