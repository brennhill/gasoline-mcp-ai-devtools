<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .section-dark { fill: #0F172A; stroke: #F97316; stroke-width: 2; }
      .section-header { fill: #F97316; stroke: #ea580c; stroke-width: 2; }
      .section-light { fill: #1E293B; stroke: #F97316; stroke-width: 1; }
      .section-highlight { fill: #FBBF24; stroke: #F97316; stroke-width: 2; }
      .text-light { fill: #FFFFFF; font-family: system-ui; font-size: 12px; font-weight: bold; }
      .text-dark { fill: #0F172A; font-family: system-ui; font-size: 12px; font-weight: bold; }
      .text-sm { font-size: 11px; }
      .arrow { stroke: #F97316; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-bidir { stroke: #F97316; stroke-width: 2; fill: none; marker-end: url(#arrowhead); marker-start: url(#arrowhead-start); }
      .label { fill: #FFFFFF; font-family: system-ui; font-size: 10px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#F97316" />
    </marker>
    <marker id="arrowhead-start" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" fill="#F97316" />
    </marker>
  </defs>

  <!-- Title -->
  <text style="font-size: 18px; font-weight: bold; fill: #FFFFFF;" x="20" y="35">Demo Automation: Screen Recording Setup</text>

  <!-- Recording Container -->
  <rect class="section-dark" x="20" y="60" width="960" height="380" rx="6"/>
  <text class="text-light" x="40" y="80" style="font-size: 13px;">🎬 Screen Recording Session (OBS)</text>

  <!-- Left side: Browser -->
  <rect class="section-header" x="40" y="110" width="220" height="320" rx="6"/>
  <text class="text-dark" x="55" y="135">🌐 Browser (Left)</text>

  <rect class="section-light" x="55" y="155" width="190" height="130" rx="4"/>
  <text class="text-light" x="70" y="175">Playwright headed</text>
  <text class="text-light" x="70" y="190">+ Gasoline ext</text>
  <text class="text-light" x="70" y="205">+ DevTools visible</text>
  <text class="text-sm" x="70" y="220">Performs actions,</text>
  <text class="text-sm" x="70" y="232">captures state</text>

  <rect class="section-light" x="55" y="305" width="190" height="100" rx="4"/>
  <text class="text-light" x="70" y="325">Next.js App</text>
  <text class="text-sm" x="70" y="340">localhost:3000</text>
  <text class="text-sm" x="70" y="353">▪ Real UI bugs</text>
  <text class="text-sm" x="70" y="366">▪ Error states</text>
  <text class="text-sm" x="70" y="379">▪ Loading states</text>

  <!-- Center: Services -->
  <rect class="section-light" x="300" y="110" width="360" height="150" rx="6"/>
  <text class="text-light" x="320" y="135" style="font-size: 12px; font-weight: bold;">Services</text>

  <rect class="section-light" x="320" y="155" width="160" height="80" rx="4"/>
  <text class="text-light" x="335" y="175">Playwright Script</text>
  <text class="text-sm" x="335" y="190">▪ Automated</text>
  <text class="text-sm" x="335" y="203">▪ Actions</text>
  <text class="text-sm" x="335" y="216">▪ State checks</text>

  <rect class="section-light" x="500" y="155" width="140" height="80" rx="4"/>
  <text class="text-light" x="515" y="175">⚙️  Gasoline MCP</text>
  <text class="text-sm" x="515" y="190">▪ Captures</text>
  <text class="text-sm" x="515" y="203">▪ Browser state</text>
  <text class="text-sm" x="515" y="216">▪ Real-time</text>

  <!-- Right side: Terminal -->
  <rect class="section-dark" x="700" y="110" width="240" height="320" rx="6"/>
  <text class="text-light" x="720" y="135">💻 Terminal (Right)</text>

  <rect class="section-highlight" x="715" y="155" width="210" height="130" rx="4"/>
  <text class="text-dark" x="730" y="175">Claude Code</text>
  <text class="text-dark" x="730" y="190">+ MCP client</text>
  <text class="text-dark" x="730" y="205">connected to</text>
  <text class="text-dark" x="730" y="220">Gasoline</text>

  <rect class="section-light" x="715" y="305" width="210" height="100" rx="4"/>
  <text class="text-light" x="730" y="325">User Questions</text>
  <text class="text-light" x="730" y="340">or</text>
  <text class="text-light" x="730" y="355">Coordinator Script</text>
  <text class="text-sm" x="730" y="370">"What's the</text>
  <text class="text-sm" x="730" y="383">slowest operation?"</text>

  <!-- Arrows showing data flow -->
  <!-- Script to Browser -->
  <path class="arrow" d="M 300 190 L 260 190"/>
  <text class="label" x="270" y="185">actions</text>

  <!-- Browser to Gasoline -->
  <path class="arrow" d="M 260 360 L 460 250"/>
  <text class="label" x="320" y="310">telemetry</text>

  <!-- Gasoline to Terminal -->
  <path class="arrow-bidir" d="M 640 200 L 700 200"/>
  <text class="label" x="665" y="195">MCP</text>

  <!-- Summary box -->
  <rect x="40" y="450" width="920" height="30" fill="none" stroke="#334155" stroke-width="1" rx="3"/>
  <text style="fill: #FFFFFF; font-size: 12px; font-family: system-ui;" x="60" y="468">Setup: OBS records both browser (left) and terminal (right) simultaneously. Playwright automates interactions.</text>
  <text style="fill: #FFFFFF; font-size: 12px; font-family: system-ui;" x="60" y="466">Gasoline captures all telemetry. Claude Code in terminal narrates what's happening in real-time.</text>
</svg>
