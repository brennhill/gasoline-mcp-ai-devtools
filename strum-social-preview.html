<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strum Social Preview — 1280x640</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            gap: 20px;
        }
        .preview {
            width: 1280px;
            height: 640px;
            background: #1a1817;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        /* Subtle gradient overlay */
        .preview::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 40%, rgba(245, 158, 11, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            z-index: 1;
        }
        .wordmark {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: -0.04em;
            color: #fafaf9;
            margin-top: 20px;
        }
        .tagline {
            font-size: 24px;
            font-weight: 500;
            color: #a8a29e;
            letter-spacing: 0.02em;
        }
        .subtitle {
            font-size: 18px;
            color: #78716c;
            margin-top: 8px;
        }
        .flow {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 32px;
        }
        .flow-step {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .flow-step.dark {
            background: #292524;
            color: #d6d3d1;
            border: 1px solid #44403c;
        }
        .flow-step.accent {
            background: linear-gradient(135deg, #d97706, #f59e0b);
            color: #1a1817;
        }
        .flow-arrow {
            color: #57534e;
            font-size: 16px;
        }
        .note {
            color: #888;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <p class="note">1280 x 640 — GitHub social preview / LinkedIn project banner. Screenshot this or use a browser-to-PNG tool.</p>

    <div class="preview">
        <div class="logo-area">
            <!-- Strum logo: charcoal circle with amber strings -->
            <svg viewBox="0 0 500 500" width="180" height="180">
                <circle cx="250" cy="250" r="240" fill="#302d2a" />
                <clipPath id="cp"><circle cx="250" cy="250" r="240" /></clipPath>
                <g clip-path="url(#cp)">
                    <g transform="translate(250, 250) rotate(-32) translate(-250, -250)">
                        <path d="M150 -100 L178 -100 Q 185 250 202 600 L150 600 Q 140 250 150 -100 Z" fill="#b45309" />
                        <path d="M212 -100 L240 -100 Q 247 250 264 600 L212 600 Q 202 250 212 -100 Z" fill="#d97706" />
                        <path d="M274 -100 L302 -100 Q 309 250 326 600 L274 600 Q 264 250 274 -100 Z" fill="#f59e0b" />
                        <path d="M336 -100 L364 -100 Q 371 250 388 600 L336 600 Q 326 250 336 -100 Z" fill="#fbbf24" />
                        <path d="M398 -100 L426 -100 Q 433 250 450 600 L398 600 Q 388 250 398 -100 Z" fill="#fcd34d" />
                    </g>
                </g>
                <circle cx="250" cy="250" r="240" fill="none" stroke="#222" stroke-width="12" />
            </svg>

            <div class="wordmark">Strum</div>
            <div class="tagline">AI DevTools</div>
            <div class="subtitle">Browser DevTools for AI coding assistants via MCP</div>

            <div class="flow">
                <span class="flow-step dark">Browser</span>
                <span class="flow-arrow">&rarr;</span>
                <span class="flow-step dark">Extension</span>
                <span class="flow-arrow">&rarr;</span>
                <span class="flow-step dark">Local Server</span>
                <span class="flow-arrow">&rarr;</span>
                <span class="flow-step accent">AI</span>
            </div>
        </div>
    </div>

</body>
</html>
