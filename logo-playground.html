<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRUM - Charcoal Base Study</title>
    <style>
        :root {
            --g-bg: #fffefa;
            --g-ink: #1a1a1a;
            --energy-speed: 2s;
            --energy-displacement: 4px;
            --ghost-opacity: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--g-bg);
            color: var(--g-ink);
            padding: 40px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            width: 320px;
            height: 320px;
            background: #f0f0f0;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-container:hover {
            --energy-speed: 0.22s;
            --energy-displacement: 22px;
            --ghost-opacity: 0.5;
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        @keyframes harmonic-osc {
            0%, 100% { transform: translateX(0); filter: brightness(1); }
            50% { transform: translateX(var(--energy-displacement)); filter: brightness(1.4); }
        }

        .strum-path {
            animation: harmonic-osc var(--energy-speed) infinite ease-in-out;
        }

        .ghost-1 { opacity: calc(var(--ghost-opacity) * 0.6); animation-delay: -0.04s !important; }
        .ghost-2 { opacity: calc(var(--ghost-opacity) * 0.3); animation-delay: -0.08s !important; }

        h1 { font-weight: 950; font-size: 3.5rem; margin: 0; letter-spacing: -0.05em; }
        h2 { font-size: 1.5rem; margin-top: 30px; margin-bottom: 5px; font-weight: 800; }
    </style>
</head>
<body>

    <h1>STRUM</h1>
    <p style="color: #64748b; font-size: 1.2rem;">Updated: Deep Charcoal Base (#302d2a)</p>

    <div class="logo-container">
        <svg viewBox="0 0 500 500" width="260" height="260">
            <!-- 1. Background (Charcoal) -->
            <circle cx="250" cy="250" r="240" fill="#302d2a" />
            
            <!-- 2. Strings (Middle Layer) -->
            <clipPath id="cp-charcoal"> <circle cx="250" cy="250" r="240" /> </clipPath>
            <g clip-path="url(#cp-charcoal)">
                <g transform="translate(250, 250) rotate(-32) translate(-250, -250)">
                    <!-- Stripe 1 -->
                    <path class="strum-path ghost-2" d="M150 -100 L178 -100 Q 185 250 202 600 L150 600 Q 140 250 150 -100 Z" fill="#b45309" style="animation-delay: -0.05s" />
                    <path class="strum-path ghost-1" d="M150 -100 L178 -100 Q 185 250 202 600 L150 600 Q 140 250 150 -100 Z" fill="#b45309" style="animation-delay: -0.03s" />
                    <path class="strum-path" d="M150 -100 L178 -100 Q 185 250 202 600 L150 600 Q 140 250 150 -100 Z" fill="#b45309" style="animation-delay: -0.01s" />
                    
                    <!-- Stripe 2 -->
                    <path class="strum-path ghost-2" d="M212 -100 L240 -100 Q 247 250 264 600 L212 600 Q 202 250 212 -100 Z" fill="#d97706" style="animation-delay: -0.1s" />
                    <path class="strum-path ghost-1" d="M212 -100 L240 -100 Q 247 250 264 600 L212 600 Q 202 250 212 -100 Z" fill="#d97706" style="animation-delay: -0.06s" />
                    <path class="strum-path" d="M212 -100 L240 -100 Q 247 250 264 600 L212 600 Q 202 250 212 -100 Z" fill="#d97706" style="animation-delay: -0.02s" />
                    
                    <!-- Stripe 3 -->
                    <path class="strum-path ghost-2" d="M274 -100 L302 -100 Q 309 250 326 600 L274 600 Q 264 250 274 -100 Z" fill="#f59e0b" style="animation-delay: -0.15s" />
                    <path class="strum-path ghost-1" d="M274 -100 L302 -100 Q 309 250 326 600 L274 600 Q 264 250 274 -100 Z" fill="#f59e0b" style="animation-delay: -0.09s" />
                    <path class="strum-path" d="M274 -100 L302 -100 Q 309 250 326 600 L274 600 Q 264 250 274 -100 Z" fill="#f59e0b" style="animation-delay: -0.03s" />
                    
                    <!-- Stripe 4 -->
                    <path class="strum-path ghost-2" d="M336 -100 L364 -100 Q 371 250 388 600 L336 600 Q 326 250 336 -100 Z" fill="#fbbf24" style="animation-delay: -0.2s" />
                    <path class="strum-path ghost-1" d="M336 -100 L364 -100 Q 371 250 388 600 L336 600 Q 326 250 336 -100 Z" fill="#fbbf24" style="animation-delay: -0.12s" />
                    <path class="strum-path" d="M336 -100 L364 -100 Q 371 250 388 600 L336 600 Q 326 250 336 -100 Z" fill="#fbbf24" style="animation-delay: -0.04s" />
                    
                    <!-- Stripe 5 -->
                    <path class="strum-path ghost-2" d="M398 -100 L426 -100 Q 433 250 450 600 L398 600 Q 388 250 398 -100 Z" fill="#fcd34d" style="animation-delay: -0.25s" />
                    <path class="strum-path ghost-1" d="M398 -100 L426 -100 Q 433 250 450 600 L398 600 Q 388 250 398 -100 Z" fill="#fcd34d" style="animation-delay: -0.15s" />
                    <path class="strum-path" d="M398 -100 L426 -100 Q 433 250 450 600 L398 600 Q 388 250 398 -100 Z" fill="#fcd34d" style="animation-delay: -0.05s" />
                </g>
            </g>

            <!-- 3. Grey Ring (Top Layer) -->
            <circle cx="250" cy="250" r="240" fill="none" stroke="#222" stroke-width="12" />
        </svg>
    </div>

</body>
</html>
