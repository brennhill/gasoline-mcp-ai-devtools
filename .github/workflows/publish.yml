name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 5.4.0)'
        required: true

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build binaries and publish packages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.24.13'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract and validate version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$TAG_NAME"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          fi

          # Validate version is strict semver (X.Y.Z)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi

          # Verify version matches VERSION file
          FILE_VERSION=$(cat VERSION)
          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: Input version $VERSION does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Build binaries for all platforms
        run: make build
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Copy binaries to package directories
        run: |
          mkdir -p npm/darwin-arm64/bin
          mkdir -p npm/darwin-x64/bin
          mkdir -p npm/linux-x64/bin
          mkdir -p npm/linux-arm64/bin
          mkdir -p npm/win32-x64/bin

          cp dist/kaboom-agentic-browser-darwin-arm64 npm/darwin-arm64/bin/kaboom
          cp dist/kaboom-agentic-browser-darwin-x64 npm/darwin-x64/bin/kaboom
          cp dist/kaboom-agentic-browser-linux-x64 npm/linux-x64/bin/kaboom
          cp dist/kaboom-agentic-browser-linux-arm64 npm/linux-arm64/bin/kaboom
          cp dist/kaboom-agentic-browser-win32-x64.exe npm/win32-x64/bin/kaboom.exe

          chmod +x npm/*/bin/*

          echo "✅ Binaries staged for package publishing"
          ls -lh npm/*/bin/

      - name: Publish darwin-arm64
        run: |
          cd npm/darwin-arm64
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish darwin-x64
        run: |
          cd npm/darwin-x64
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish linux-x64
        run: |
          cd npm/linux-x64
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish linux-arm64
        run: |
          cd npm/linux-arm64
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish win32-x64
        run: |
          cd npm/win32-x64
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish aggregate package
        run: |
          cd npm/kaboom-agentic-browser
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Published v${{ steps.version.outputs.VERSION }} package set"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Platform and aggregate packages were published."
